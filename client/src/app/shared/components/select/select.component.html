<div class="flex w-full flex-col">
  <!-- LABEL -->
  @if (label()) {
    <label class="font-bold" [for]="id()" [id]="id() + '-label'"> {{ label() }}: </label>
  }

  <div class="relative">
    <!-- VISUAL DROPDOWN TRIGGER -->
    <button
      type="button"
      [class]="
        `flex min-h-10 w-full items-center rounded-lg border-4 bg-white px-2 py-1 text-left shadow-2xl` +
        ` focus:ring-1 focus:outline-none` +
        ` disabled:cursor-not-allowed disabled:bg-gray-300 disabled:opacity-50 disabled:shadow-none` +
        ` ${isFormControlInvalid() ? 'border-red-500 focus:ring-red-500' : 'border-black focus:ring-black'}`
      "
      [attr.aria-controls]="id() + '-listbox'"
      [attr.aria-expanded]="isOpen()"
      [attr.aria-haspopup]="'listbox'"
      [disabled]="formControlInput().disabled"
      (click)="onToggleDropdown()"
    >
      <span class="flex flex-1 items-center justify-start">
        @if (selectedOption?.imageSrc) {
          <img class="h-8 w-8" [src]="selectedOption!.imageSrc" [alt]="getOptionAriaLabel(selectedOption!)" />
        } @else if (placeholder()) {
          <span class="text-gray-500">{{ placeholder() }}</span>
        }
      </span>

      <span class="pointer-events-none ml-2 inline-flex items-center justify-center">
        <svg
          viewBox="0 0 24 24"
          class="h-4 w-4 fill-black transition-transform"
          [class.rotate-180]="isOpen()"
          aria-hidden="true"
        >
          <path d="M7 10l5 5 5-5z" />
        </svg>
      </span>
    </button>

    <!-- NATIVE SELECT FOR FORM SEMANTICS -->
    <select class="sr-only" [formControl]="formControlInput()" [id]="id()" tabindex="-1" aria-hidden="true">
      @if (placeholder()) {
        <option value="" disabled>{{ placeholder() }}</option>
      }
      @for (option of options(); track option.value) {
        <option [value]="option.value" [disabled]="option.disabled === true">{{ option.label }}</option>
      }
    </select>

    <!-- CUSTOM DROPDOWN PANEL -->
    @if (isOpen()) {
      <div
        role="listbox"
        [attr.aria-labelledby]="label() ? id() + '-label' : null"
        [attr.aria-activedescendant]="selectedOption ? id() + '-option-' + selectedOption.value : null"
        class="absolute z-50 mt-1 w-full rounded-lg border-4 border-black bg-white p-2 shadow-2xl"
        [id]="id() + '-listbox'"
      >
        <div class="grid max-h-44 grid-cols-4 gap-2 overflow-y-auto sm:grid-cols-6">
          @for (option of options(); track option.value) {
            <button
              type="button"
              role="option"
              [attr.id]="id() + '-option-' + option.value"
              [attr.aria-selected]="selectedOption?.value === option.value"
              [attr.aria-disabled]="option.disabled === true"
              class="flex aspect-square items-center justify-center rounded-lg border-2 border-black bg-white p-1 transition-colors hover:bg-gray-300 focus:ring-1 focus:outline-none"
              [class.cursor-not-allowed]="option.disabled === true"
              [class.opacity-50]="option.disabled === true"
              [class.bg-gray-300]="selectedOption?.value === option.value"
              [attr.aria-label]="getOptionAriaLabel(option)"
              [disabled]="option.disabled === true"
              (click)="selectOption(option)"
            >
              @if (option.imageSrc) {
                <img class="h-9 w-9" [src]="option.imageSrc" [alt]="getOptionAriaLabel(option)" />
              } @else {
                <span class="text-xs font-bold">{{ option.label }}</span>
              }
            </button>
          }
        </div>
      </div>
    }
  </div>
</div>
