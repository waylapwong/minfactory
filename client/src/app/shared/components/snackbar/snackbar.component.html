@if (isOpen() && message()) {
  <div class="pointer-events-none fixed inset-x-0 bottom-4 z-50 flex justify-center px-4">
    <output
      aria-live="polite"
      class="w-full max-w-md rounded-lg border-4 border-black bg-gray-100 px-4 py-3 text-center font-bold text-neutral-900 shadow-xl"
    >
      {{ message() }}
    </output>
  </div>
}
