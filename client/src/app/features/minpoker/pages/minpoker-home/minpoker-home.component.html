<div class="flex flex-col">
  <!-- TITLE -->
  <div class="text-center">
    <min-h1><min-logo>Poker</min-logo></min-h1>
    <p class="mb-4 text-gray-500">Das minimalistische Texas Hold'em Pokerspiel.</p>
  </div>

  <!-- MENU -->
  <div class="flex grow flex-col gap-2">
    <!-- MY GAMES -->
    <min-card-button (clicked)="routingService.navigateToMinPokerMyGames()">
      <min-h2>Meine Spiele</min-h2>
      <p class="text-gray-500">Deine eigenen Pokerspiele</p>
    </min-card-button>
    <!-- PUBLIC GAMES -->
    <min-card-button (clicked)="routingService.navigateToMinPokerPublicGames()">
      <min-h2>Öffentliche Spiele</min-h2>
      <p class="text-gray-500">Alle öffentlichen Pokerspiele</p>
    </min-card-button>
  </div>
</div>
