<div class="flex h-full flex-col px-4">
  <!-- TITLE -->
  <div class="relative flex items-center justify-center">
    <!-- BACK BUTTON -->
    <div class="absolute top-0 left-0">
      <min-button ariaLabel="Zurück" title="Zurück" [color]="Color.White" (clicked)="routingService.navigateToMinRps()">
        <img src="assets/svgs/minrps/back.svg" alt="Zurück" class="h-4 w-4" />
      </min-button>
    </div>
    <!-- TITLE -->
    <min-h1>Multiplayer</min-h1>
    <!-- NEW GAME BUTTON -->
    <div class="absolute top-0 right-0">
      <min-button ariaLabel="Neues Spiel" title="Neues Spiel" [color]="Color.Blue" (clicked)="openNewGameDialog()">
        <img src="assets/svgs/minrps/add.svg" alt="Neues Spiel" class="h-4 w-4" />
      </min-button>
    </div>
  </div>

  <!-- GAMES -->
  @for (game of games(); track $index) {
    <min-card-button class="mb-2" (clicked)="navigateToMultiplayerPage(game.id)">
      <div class="flex flex-row items-start justify-between">
        <min-h2 class="grow text-left break-all">{{ game.name }}</min-h2>
        <min-button [color]="Color.Red" (clicked)="openDeleteDialog(game.id, $event)">
          <img src="assets/svgs/minrps/delete.svg" alt="Spiel löschen" class="h-4 w-4" />
        </min-button>
      </div>
      <div class="flex flex-row items-end gap-2 text-left text-sm text-gray-500">
        <img src="assets/svgs/minrps/pawn.svg" alt="Spieler" class="h-5 w-5" />
        {{ game.playerCount }}/2
      </div>
      <div class="flex flex-row items-end gap-2 text-left text-sm text-gray-500">
        <img src="assets/svgs/minrps/observer.svg" alt="Beobachter" class="h-5 w-5" />
        {{ game.observerCount }}
      </div>
      <div class="flex flex-row items-end gap-2 text-left text-sm text-gray-500">
        <img src="assets/svgs/minrps/calendar.svg" alt="Datum" class="h-5 w-5" />
        {{ game.createdAt | date: 'd. MMMM yyyy' }}
      </div>
      <div class="flex flex-row items-end gap-2 text-left text-sm text-gray-500">
        <img src="assets/svgs/minrps/clock.svg" alt="Uhrzeit" class="h-5 w-5" />
        {{ game.createdAt | date: 'HH:mm' }}
      </div>
    </min-card-button>
  }

  <!-- NEW GAME DIALOG -->
  <min-dialog title="Neues Spiel" [isOpen]="isNewGameDialogOpen()" (closed)="isNewGameDialogOpen.set(false)">
    <min-input label="Spielname" [formControlInput]="newGameName" id="game-name-input"></min-input>
    <div class="mt-4 flex flex-row justify-end">
      <min-button [color]="Color.Blue" [isDisabled]="newGameFormGroup.invalid" (clicked)="createGame()">
        Spiel erstellen
      </min-button>
    </div>
  </min-dialog>

  <!-- DELETE DIALOG -->
  <min-dialog title="Spiel löschen" [isOpen]="isDeleteDialogOpen()" (closed)="cancelDeleteGame()">
    <p class="my-4">Möchtest du das Spiel wirklich löschen?</p>
    <div class="flex flex-row justify-end gap-2">
      <min-button [color]="Color.Red" (clicked)="confirmDeleteGame()">Löschen</min-button>
      <min-button [color]="Color.Gray" (clicked)="cancelDeleteGame()">Abbrechen</min-button>
    </div>
  </min-dialog>
</div>
