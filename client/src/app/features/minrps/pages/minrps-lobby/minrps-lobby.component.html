<div class="flex flex-row justify-between">
  <!-- TITLE -->
  <min-h1>Online Games</min-h1>
  <!-- NEW GAME BUTTON -->
  <min-button [color]="Color.Blue" (clicked)="openNewGameDialog()">New Game</min-button>
</div>

<!-- GAMES LIST -->
@for (game of games(); track $index) {
  <div class="flex flex-row justify-center">
    <min-card-button class="basis-3xs">
      <div class="flex flex-row items-start justify-between">
        <min-h2>{{ game.name }}</min-h2>
      </div>
      <p class="text-left text-sm text-gray-500">ID: {{ game.id }}</p>
    </min-card-button>
  </div>
}

<!-- NEW GAME DIALOG -->
<min-dialog
  title="New Game"
  [isOpen]="isNewGameDialogOpen()"
  (closed)="isNewGameDialogOpen.set(false)"
>
  <div class="mb-4 flex flex-col">
    <min-input label="Game name" [formControlInput]="gameName" id="game-name-input"></min-input>
  </div>

  <div class="flex flex-row justify-end">
    <min-button [color]="Color.Blue" [isDisabled]="formGroup.invalid" (clicked)="createNewGame()">
      Create Game
    </min-button>
  </div>
</min-dialog>
