<header class="flex flex-row items-center justify-between">
  <!-- BREADCRUMB NAVIGATION -->
  <nav aria-label="Breadcrumb" role="navigation">
    <ol class="flex flex-row items-center">
      <!-- FACTORY (HOME) -->
      <li>
        <a
          [routerLink]="AppPath.Root"
          class="flex items-center gap-1 rounded px-2 py-1 font-bold text-gray-700 transition-colors hover:text-black focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:ring-offset-1 focus-visible:outline-none active:text-gray-900"
          [attr.aria-current]="isInFactory() ? 'page' : null"
        >
          <!-- BACK ARROW WHEN NOT IN FACTORY CONTEXT (MOBILE + DESKTOP) -->
          @if (!isInFactory()) {
            <span class="text-lg">&lt;</span>
          }
          <!-- SHOW LOGO TEXT ONLY IN FACTORY CONTEXT -->
          @if (isInFactory()) {
            <span>
              <min-logo>Factory</min-logo>
            </span>
          }
        </a>
      </li>

      <!-- RPS CONTEXT -->
      @if (isInMinRps()) {
        <li>
          <a
            [routerLink]="AppPath.MinRps"
            class="rounded px-2 py-1 font-bold text-gray-700 transition-colors hover:text-black focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:ring-offset-1 focus-visible:outline-none active:text-gray-900"
            [attr.aria-current]="isInMinRps() ? 'page' : null"
          >
            <min-logo>RPS</min-logo>
          </a>
        </li>
      }
    </ol>
  </nav>

  <!-- PLACEHOLDER FOR FUTURE ACTIONS -->
  <div class="flex flex-row gap-2"></div>
</header>

<min-divider></min-divider>
