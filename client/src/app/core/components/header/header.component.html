<header class="flex flex-row items-center justify-between">
  <!-- BREADCRUMB NAVIGATION -->
  <nav aria-label="Breadcrumb" role="navigation">
    <ol class="flex flex-row items-center">
      <!-- MINFACTORY (HOME) -->
      <li>
        <a
          [routerLink]="AppPath.Root"
          class="inline-flex h-8 items-center rounded px-2 py-1 leading-none font-bold text-gray-700 transition-colors hover:text-black focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:ring-offset-1 focus-visible:outline-none active:text-gray-900"
          [attr.aria-current]="isInFactory() ? 'page' : null"
        >
          <!-- HOME ICON WHEN NOT IN FACTORY CONTEXT (MOBILE + DESKTOP) -->
          @if (!isInFactory()) {
            <img src="assets/svgs/minfactory/home.svg" alt="minFactory" class="h-4 w-4" />
          }
          <!-- SHOW LOGO TEXT ONLY IN FACTORY CONTEXT -->
          @if (isInFactory()) {
            <span>
              <min-logo>Factory</min-logo>
            </span>
          }
        </a>
      </li>

      <!-- MINRPS CONTEXT -->
      @if (isInMinRps()) {
        <li aria-hidden="true" class="leading-none text-gray-500">/</li>
        <li>
          <a
            [routerLink]="AppPath.MinRps"
            class="inline-flex h-8 items-center rounded px-2 py-1 leading-none font-bold text-gray-700 transition-colors hover:text-black focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:ring-offset-1 focus-visible:outline-none active:text-gray-900"
            [attr.aria-current]="isInMinRps() ? 'page' : null"
          >
            <min-logo>RPS</min-logo>
          </a>
        </li>
      }
    </ol>
  </nav>

  <!-- ACTIONS -->
  <div class="flex flex-row gap-2">
    <min-button [color]="Color.White" ariaLabel="Info">
      <img src="assets/svgs/minfactory/info.svg" alt="Info" class="h-4 w-4" />
    </min-button>
  </div>
</header>

<min-divider></min-divider>
