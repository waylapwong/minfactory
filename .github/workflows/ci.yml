name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  node-ci:
    name: ${{ matrix.app.name }} - lint, test, build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - { name: client, path: client }
          - { name: server, path: server }

    defaults:
      run:
        working-directory: ${{ matrix.app.path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            ${{ matrix.app.path }}/package-lock.json
      
      - name: Install Chrome
        if: matrix.app.name == 'client'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libxss1 \
            libasound2t64 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxrandr2 \
            libgbm1 \
            libgtk-3-0 \
            fonts-liberation

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci
        continue-on-error: false

      - name: Build
        run: npm run build

  deploy-backend:
    name: Deploy backend (Heroku)
    runs-on: ubuntu-latest
    needs: node-ci
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add Heroku remote
        env:
          HEROKU_GIT_URL: ${{ secrets.HEROKU_GIT_URL }}
        run: |
          git remote remove heroku || true
          git remote add heroku "$HEROKU_GIT_URL"

      - name: Deploy server subtree to Heroku
        run: git subtree push --prefix server heroku main

  deploy-frontend:
    name: Deploy frontend (placeholder)
    runs-on: ubuntu-latest
    needs: node-ci
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Frontend deploy not active yet
        run: echo "Frontend deploy step is intentionally a no-op for now."
